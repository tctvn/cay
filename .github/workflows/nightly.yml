name: Nightly Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-classic:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Windows Classic (CMake)
        run: |
          cmake -B build
          cmake --build build --config Release --target cay-classic

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cay-classic
          path: build/Release/cay-classic.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd src/platform/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cay-android
          path: src/platform/android/app/build/outputs/apk/debug/*.apk

  publish-nightly:
    needs: [build-windows-classic, build-android]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake extra-cmake-modules fcitx5 libfcitx5core-dev libfcitx5config-dev libfcitx5utils-dev fcitx5-modules-dev

      - name: Build Fcitx5 Plugin (CMake)
        run: |
          mkdir -p build-fcitx5
          cd build-fcitx5
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_FCITX5=ON
          make -j$(nproc)

      - name: Archive Linux fcitx5 Plugin
        run: |
          cd build-fcitx5
          make install DESTDIR=$PWD/install_root
          cd install_root
          tar -czvf cayime-fcitx5-linux.tar.gz usr/
          mv cayime-fcitx5-linux.tar.gz ../../

      - name: Update Nightly Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin nightly --force

      - name: Download Windows Classic Artifact
        uses: actions/download-artifact@v4
        with:
          name: cay-classic
          path: .

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: cay-android
          path: android-apk

      - name: Rename APK
        run: |
          cd android-apk
          for f in *.apk; do
            # org.fcitx.fcitx5.android-arm64-v8a-debug.apk -> cay-android-nightly-arm64-v8a.apk
            NEW_NAME=$(echo "$f" | sed -E 's/.*-(armeabi-v7a|arm64-v8a|x86|x86_64|universal)-debug.apk/cay-android-nightly-\1.apk/')
            # Fallback if sed doesn't match
            if [ "$NEW_NAME" == "$f" ]; then
              NEW_NAME="cay-android-nightly-$f"
            fi
            mv "$f" "../$NEW_NAME"
          done
          cd ..

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: CayIME Nightly Build
          body: |
            Bản build Nightly tự động cập nhật từ nhánh `main`.

            ⚠️ **Cảnh báo**: Đây là phiên bản thử nghiệm (Experimental), có thể thiếu ổn định. Bao gồm bản Fcitx5 Linux, bản Classic cho Windows và bản Android.
          prerelease: true
          files: |
            cayime-fcitx5-linux.tar.gz
            cay-classic.exe
            cay-android-nightly-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
