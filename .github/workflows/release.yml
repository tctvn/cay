name: Build and Release Cay

on:
  push:
    tags:
      - 'v*'
      - 'cay'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Windows (CMake)
        run: |
          cmake -B build
          cmake --build build --config Release
          cmake -A ARM64 -B build-arm64
          cmake --build build-arm64 --config Release
          mv build-arm64/Release/cay.exe build/Release/cay-arm.exe

      - name: Publish Windows to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Release/cay.exe
            build/Release/cayy.exe
            build/Release/cay-arm.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build macOS Universal (Intel + M1/M2)
        run: |
          cmake -B build -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"
          cmake --build build --config Release

      - name: Archive macOS App Bundle
        run: |
          # Use ditto to preserve permissions and resource forks
          ditto -c -k --sequesterRsrc --keepParent build/cay.app build/cay-mac.zip

      - name: Publish macOS to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/cay-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        working-directory: src/platform/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/cay-android.apk

      - name: Publish Android APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: src/platform/android/app/build/outputs/apk/debug/cay-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
